    <!-- CSP script-src hash (sha256 of the inline <script> body, base64): regenerate
         if the block below changes and a CSP that pins it is enforced.
         sha256-PjWNPpfp7Mntj53voHaSJi0riWL1HwoLgebWF4pVxFM= -->
    <script>
      // Standard Red Notes: default to SAME-ORIGIN so the browser never makes a
      // cross-origin request to the API. nginx (app/docker/nginx.conf) proxies
      // /v1, /v2, /auth, /subscription and /sockets to the backend on this same
      // origin. Cross-origin (app on :3001, API on :3000) is blocked by CORS +
      // browser "Local Network Access" gating and silently breaks sync.
      // Operators fronting the API on a different host can still override these
      // by editing this block (or via a reverse proxy that routes by path).
      window.defaultSyncServer = window.location.origin
      window.defaultFilesHost = window.location.origin
      window.enabledUnfinishedFeatures = false
      // Client-side PDF OCR (tesseract.js). Files are end-to-end encrypted, so OCR
      // runs in the browser, not on the server — these globals only gate whether
      // the client offers the "Extract text (OCR)" action and which language it
      // defaults to. Operators set them via OCR_ENABLED / OCR_DEFAULT_LANGUAGE
      // (see the app Docker entrypoint, which templates this file at startup).
      window.ocrEnabled = false
      window.ocrDefaultLanguage = 'eng'
      // Same-origin websocket (proxied by nginx to the websocket-gateway). Uses
      // wss:// when the page is served over https. See the /sockets proxy block.
      window.websocketUrl =
        (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/sockets'
      // Serve Excalidraw fonts from our own origin (no CDN) — see webpack copy.
      window.EXCALIDRAW_ASSET_PATH = '/excalidraw/'
      window.purchaseUrl = 'about:blank'
      window.plansUrl = 'about:blank'
      window.dashboardUrl = 'about:blank'

      // Stale-service-worker recovery. An old service worker can serve a cached
      // app.js that no longer matches the freshly served index.html, leaving the
      // page BLANK — and the in-app "reload to update" prompt can't render to
      // rescue it. If the React root (#app-group-root) hasn't mounted any content
      // shortly after load, recover ONCE: drop the shell caches, unregister
      // service workers, and reload to fetch a fresh bundle. The sessionStorage
      // guard prevents a reload loop if the page is genuinely broken.
      window.addEventListener('load', function () {
        setTimeout(function () {
          var root = document.getElementById('app-group-root')
          if (root && root.childElementCount > 0) {
            return
          }
          try {
            if (sessionStorage.getItem('srn-blank-recovery')) {
              return
            }
            sessionStorage.setItem('srn-blank-recovery', '1')
          } catch (e) {}
          var reload = function () {
            window.location.reload()
          }
          var jobs = []
          try {
            if (window.caches && caches.keys) {
              jobs.push(
                caches.keys().then(function (keys) {
                  return Promise.all(
                    keys.map(function (k) {
                      return k.indexOf('srn-shell-') === 0 ? caches.delete(k) : null
                    }),
                  )
                }),
              )
            }
            if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
              jobs.push(
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                  return Promise.all(
                    regs.map(function (r) {
                      return r.unregister()
                    }),
                  )
                }),
              )
            }
          } catch (e) {}
          Promise.all(jobs).then(reload, reload)
        }, 10000)
      })
    </script>

    <!-- Stylesheet BEFORE the script: a render-blocking <script> placed after a
         stylesheet link waits for that CSS to finish loading before executing,
         so the app never measures layout (mounts React, sizes the panes) while
         the stylesheet is still loading. Loading the script first caused a
         forced layout / flash of unstyled content and a broken initial render. -->
    <link rel="stylesheet" media="all" href="./app.css" debug="false" />
    <script src="./app.js" debug="false"></script>
  </head>
