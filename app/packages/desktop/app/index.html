<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
  <head>
    <meta charset="utf-8" />
    <!--
      Content-Security-Policy notes (desktop hardening):

      connect-src: The desktop talks to a USER-CONFIGURABLE sync/files/websocket
      server. The default is https://api.standardnotes.com, but users may point
      the app at an arbitrary self-hosted server (incl. a bundled "home server"
      running on plain HTTP at http://localhost:3000 and, when exposed on the
      LAN, http://<lan-ip>:3127, plus the local extensions server at
      http://127.0.0.1:45653). Because the server origin is chosen at runtime by
      the user and is not known at build time, we cannot enumerate a fixed
      origin allowlist without breaking self-hosting. CSP host-source syntax also
      does not support IP/CIDR ranges, so an arbitrary LAN IP cannot be matched
      by anything narrower than the `http:`/`ws:` schemes. We therefore allow the
      https:/wss: secure transports plus http:/ws: (needed for the plain-HTTP
      self-hosted home server and the loopback extensions server). This is the
      tightest policy that keeps user-configured servers working; it still
      improves on the previous bare `connect-src *` by dropping every other
      scheme (ftp:, file:, chrome-extension:, etc.) and is paired with
      webSecurity:true + allowRunningInsecureContent:false in the main process.

      frame-src: youtube/vimeo embeds plus the WebEmbed feature, which lets users
      embed ARBITRARY https pages. `https:` is therefore required; we drop the
      bare `*` (which also allowed http:/data:/etc.). blob: kept for in-app PDF
      and generated-document frames.

      img-src: tightened from `*` to 'self' data: blob: https:.

      script-src is intentionally 'self' 'wasm-unsafe-eval' (no unsafe-inline /
      unsafe-eval). default-src/worker-src unchanged.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self' blob:;
        script-src 'self' 'wasm-unsafe-eval';
        worker-src 'self' blob:;
        connect-src 'self' https: wss: http: ws: data: blob:;
        style-src 'self' 'unsafe-hashes' http://localhost:* http://127.0.0.1:45653 'sha256-jpJOxTrdc58x4woq2mVygDDIvjIAGNkLZ2yfx4ppdXo=' 'sha256-tbWZ4NP1341cpcrZVDn7B3o9bt/muXgduILAnC0Zbaw=';
        frame-src 'self' https: blob:;
        img-src 'self' data: blob: https:;
      "
    />

    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <meta name="theme-color" content="#ffffff" />

    <meta content="Standard Red Notes" name="apple-mobile-web-app-title" />
    <meta content="Standard Red Notes" name="application-name" />

    <script src="web/app.js"></script>
    <script src="javascripts/renderer/renderer.js"></script>

    <link rel="stylesheet" media="all" href="web/app.css" />
    <link rel="stylesheet" media="all" href="stylesheets/renderer.css" />
  </head>

  <body>
    <div id="desktop-title-bar">
      <div class="title-bar-left-buttons">
        <button id="menu-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-menu"
          >
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="title-bar-right-buttons">
        <button id="min-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-minus"
          >
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="max-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-maximize-2"
          >
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
          </svg>
        </button>
        <button id="close-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-x"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
  </body>
</html>
