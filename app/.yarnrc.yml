checksumBehavior: update

nodeLinker: node-modules

# Install native optional deps for ALL target platforms, not just the host.
# The desktop app bundles @standardnotes/home-server, whose tree pulls in
# platform-specific optional natives (e.g. @cbor-extract/cbor-extract-*).
# electron-builder's (and Electron Forge's) dependency collector treats those
# as required and fails when the host-foreign variant is absent, so we make
# yarn fetch every variant up front.
supportedArchitectures:
  os:
    - current
    - darwin
    - linux
    - win32
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc
    - musl

packageExtensions:
  "@types/react-beautiful-dnd@*":
    peerDependencies:
      "@types/react": "*"
  "@types/react-dom@*":
    peerDependencies:
      "@types/react": "*"
  "@types/react-redux@*":
    peerDependencies:
      "@types/react": "*"
  "@types/react-transition-group@*":
    peerDependencies:
      "@types/react": "*"
  react-dev-utils@*:
    peerDependencies:
      react-error-overlay: "*"

plugins:
  - path: .yarn/plugins/@yarnpkg/plugin-workspace-tools.cjs
    spec: "@yarnpkg/plugin-workspace-tools"
  - path: .yarn/plugins/@yarnpkg/plugin-version.cjs
    spec: "@yarnpkg/plugin-version"
  - path: .yarn/plugins/@yarnpkg/plugin-docker-build.cjs
    spec: "https://github.com/Dcard/yarn-plugins/releases/latest/download/plugin-docker-build.js"

yarnPath: .yarn/releases/yarn-3.2.1.cjs
