server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Third-party editor/component assets (e.g. org.standardnotes.standard-sheets)
  # are loaded by sandboxed component iframes that may run on a different origin
  # than the main app. Fonts and other subresources require CORS headers or the
  # browser blocks them ("Access-Control-Allow-Origin missing"). Serve these
  # static assets with a permissive CORS header so @font-face and asset fetches
  # succeed regardless of the iframe origin.
  location /components/ {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Range" always;
    types {
      font/ttf        ttf;
      font/woff       woff;
      font/woff2      woff2;
      application/json json;
      image/svg+xml   svg;
    }
    try_files $uri $uri/ =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
