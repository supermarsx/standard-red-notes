# Standard Red Notes: WebSocket upgrade plumbing. `map` must live at http scope,
# so it sits OUTSIDE the server block (conf.d/*.conf is included within http{}).
# Sends "Connection: upgrade" only for actual upgrade requests, "close" otherwise.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  # Hardening: listen on 8080 (>1024) so nginx runs fully as the unprivileged
  # `nginx` user without CAP_NET_BIND_SERVICE. Compose maps the host port here.
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # ---------------------------------------------------------------------------
  # Standard Red Notes: same-origin API + realtime proxy.
  #
  # The web UI, the /v1 API gateway and the realtime websocket are served under
  # ONE origin (this nginx) so the browser never issues a CROSS-origin request.
  # Publishing the app and API on separate ports (e.g. :3001 vs :3000) makes
  # every sync call cross-origin, which modern browsers block via CORS preflight
  # AND "Local Network Access" gating (Firefox/Chrome refuse localhost->localhost
  # fetches) — silently breaking sync. Proxying here matches the intended
  # single-host design (see the Traefik example in docker-compose.yml).
  #
  # Hostnames are the compose service names on the shared docker network.
  # ---------------------------------------------------------------------------

  # Resolve upstreams at REQUEST time via docker's embedded DNS, not at config
  # load. Using literal hostnames in proxy_pass makes nginx resolve them eagerly
  # at startup and abort ("host not found in upstream") if a backend container is
  # momentarily unresolvable (e.g. started with --no-deps / different boot order).
  # A `resolver` + a variable in proxy_pass defers resolution to each request.
  resolver 127.0.0.11 ipv6=off valid=30s;

  # Realtime websocket gateway (live-sync push) + its /sockets/tokens HTTP route.
  # The gateway now runs IN-PROCESS inside the api-gateway on the SAME port (3000):
  # it accepts the ws upgrade on any /sockets path and reads ?authToken, and its
  # token endpoint is literally /sockets/tokens — so the full URI is preserved.
  # This block stays separate from the /v1 regex below because it (and only it)
  # carries the Upgrade/Connection headers the websocket handshake needs.
  location /sockets {
    set $srn_ws server:3000;
    proxy_pass http://$srn_ws$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  # HTTP API gateway: sync, auth, subscriptions, files. Files stream Content-Range
  # bodies and can be large, so disable request buffering and lift the body cap.
  # Regex location takes priority over the `location /` SPA fallback below.
  location ~ ^/(v1|v2|auth|subscription|healthcheck)(/|$) {
    set $srn_api server:3000;
    proxy_pass http://$srn_api$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_read_timeout 300s;
  }

  # Third-party editor/component assets (e.g. org.standardnotes.standard-sheets)
  # are loaded by sandboxed component iframes that may run on a different origin
  # than the main app. Fonts and other subresources require CORS headers or the
  # browser blocks them ("Access-Control-Allow-Origin missing"). Serve these
  # static assets with a permissive CORS header so @font-face and asset fetches
  # succeed regardless of the iframe origin.
  # Component assets just need permissive CORS (sandboxed iframes fetch fonts/assets
  # cross-origin). Do NOT add a `types {}` block here or at server scope — it would
  # REPLACE the global mime.types map (not extend it), making .css/.js fall back to
  # application/octet-stream, which breaks stylesheets and makes editors download
  # instead of render. The base image's global mime.types handles css/js/woff/woff2.
  location /components/ {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Range" always;

    # Map the few font extensions the stock mime.types may miss, scoped to single
    # file extensions so the global type map still applies to everything else.
    location ~* \.ttf$  { add_header Access-Control-Allow-Origin "*" always; default_type font/ttf; }
    location ~* \.otf$  { add_header Access-Control-Allow-Origin "*" always; default_type font/otf; }

    try_files $uri $uri/ =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
