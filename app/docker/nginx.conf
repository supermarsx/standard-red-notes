server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Third-party editor/component assets (e.g. org.standardnotes.standard-sheets)
  # are loaded by sandboxed component iframes that may run on a different origin
  # than the main app. Fonts and other subresources require CORS headers or the
  # browser blocks them ("Access-Control-Allow-Origin missing"). Serve these
  # static assets with a permissive CORS header so @font-face and asset fetches
  # succeed regardless of the iframe origin.
  # Component assets just need permissive CORS (sandboxed iframes fetch fonts/assets
  # cross-origin). Do NOT add a `types {}` block here or at server scope — it would
  # REPLACE the global mime.types map (not extend it), making .css/.js fall back to
  # application/octet-stream, which breaks stylesheets and makes editors download
  # instead of render. The base image's global mime.types handles css/js/woff/woff2.
  location /components/ {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Range" always;

    # Map the few font extensions the stock mime.types may miss, scoped to single
    # file extensions so the global type map still applies to everything else.
    location ~* \.ttf$  { add_header Access-Control-Allow-Origin "*" always; default_type font/ttf; }
    location ~* \.otf$  { add_header Access-Control-Allow-Origin "*" always; default_type font/otf; }

    try_files $uri $uri/ =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
