name: standard-red-notes

x-server-env: &server-env
  # Set to true ONLY for local/dev to bypass the entrypoint's published-default-secret
  # guard. A real deployment must instead supply real AUTH_JWT_SECRET /
  # AUTH_SERVER_ENCRYPTION_SERVER_KEY / VALET_TOKEN_SECRET (the guard refuses to boot
  # while the published defaults are in use).
  ALLOW_INSECURE_DEFAULTS: ${ALLOW_INSECURE_DEFAULTS:-}
  DB_HOST: db
  DB_PORT: 3306
  DB_USERNAME: ${MYSQL_USER:-std_notes_user}
  DB_PASSWORD: ${MYSQL_PASSWORD:-changeme123}
  DB_DATABASE: ${MYSQL_DATABASE:-standard_notes_db}
  DB_TYPE: mysql
  CACHE_TYPE: redis
  REDIS_HOST: cache
  REDIS_PORT: 6379
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-auth-jwt-secret-change-me}
  # Must be a 64-char hex string (32 bytes); auth's CrypterNode validates this. Override in prod.
  AUTH_SERVER_ENCRYPTION_SERVER_KEY: ${AUTH_SERVER_ENCRYPTION_SERVER_KEY:-deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef}
  VALET_TOKEN_SECRET: ${VALET_TOKEN_SECRET:-dev-valet-token-secret-change-me}
  # Auth session cookies. The auth service authenticates browser requests off the
  # access_token_<session> cookie, so these MUST suit the deployment or every
  # authed request 401s. Defaults below are for an http://localhost self-host:
  # empty domain -> host-only cookie (works on localhost / any bare host or IP);
  # SameSite=Lax + Secure=false so the cookie is stored/sent over plain http.
  # For an HTTPS deployment behind a domain, set COOKIE_DOMAIN, COOKIE_SECURE=true.
  COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
  COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
  COOKIE_SECURE: ${COOKIE_SECURE:-false}
  COOKIE_PARTITIONED: ${COOKIE_PARTITIONED:-false}
  # Reverse-proxy support. When the stack runs behind a TLS-terminating proxy
  # (nginx/Traefik/Caddy), the server must trust the proxy's X-Forwarded-Proto /
  # X-Forwarded-For headers so req.secure / req.ip reflect the real client.
  # Default "loopback, linklocal, uniquelocal" trusts a proxy on loopback or a
  # private/Docker network (the usual compose setup) but NOT arbitrary public
  # clients, so direct access still works and forwarded headers can't be spoofed.
  # Set to "true" to trust any number of hops, a number N to trust N hops, or a
  # CSV of proxy IPs/subnets. See docs/self-hosting.md "Running behind a reverse
  # proxy". Pair with COOKIE_SECURE=true when TLS is terminated at the proxy.
  TRUST_PROXY: ${TRUST_PROXY:-loopback, linklocal, uniquelocal}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  # Comma-separated emails granted the InternalTeamUser (admin) role, which
  # unlocks the in-app Admin panel and the /admin user-management endpoints.
  ADMIN_EMAILS: ${ADMIN_EMAILS:-}
  STANDARD_RED_FEATURES_MODE: ${STANDARD_RED_FEATURES_MODE:-included}
  STANDARD_RED_ENTITLEMENT_MODE: ${STANDARD_RED_ENTITLEMENT_MODE:-included}
  STANDARD_RED_FULL_FEATURE_DURATION_DAYS: ${STANDARD_RED_FULL_FEATURE_DURATION_DAYS:-36500}
  STANDARD_RED_FULL_FEATURE_FILE_UPLOAD_BYTES_LIMIT: ${STANDARD_RED_FULL_FEATURE_FILE_UPLOAD_BYTES_LIMIT:--1}
  # Revision history retention. Both default to 0 = unlimited (no pruning),
  # preserving the upstream behavior. When set, the revisions service prunes a
  # note/file's history on each new revision: REVISIONS_RETENTION_DAYS deletes
  # revisions older than the window; REVISIONS_MAX_COUNT_PER_ITEM keeps only the
  # N most-recent revisions per item.
  REVISIONS_RETENTION_DAYS: ${REVISIONS_RETENTION_DAYS:-0}
  REVISIONS_MAX_COUNT_PER_ITEM: ${REVISIONS_MAX_COUNT_PER_ITEM:-0}
  PUBLIC_FILES_SERVER_URL: ${PUBLIC_FILES_SERVER_URL:-http://localhost:3125}
  # Self-hosted realtime WebSocket gateway. It now runs IN-PROCESS inside the
  # api-gateway on the SAME port (:3000) — no separate listener/process. The
  # api-gateway POSTs to its own /sockets/tokens to mint connection tokens, so
  # this URL points at the api-gateway itself (localhost:3000).
  WEB_SOCKET_SERVER_URL: ${WEB_SOCKET_SERVER_URL:-http://localhost:3000}
  WEBSOCKET_GATEWAY_INTERNAL_SECRET: ${WEBSOCKET_GATEWAY_INTERNAL_SECRET:-dev-ws-internal-secret-change-me}
  # Connection-token signing for the in-process WebSocket gateway. The api-gateway
  # reads these from its environment and passes them to attachWebSocketGateway.
  WEB_SOCKET_CONNECTION_TOKEN_SECRET: ${WEB_SOCKET_CONNECTION_TOKEN_SECRET:-dev-ws-conn-token-secret-change-me}
  WEB_SOCKET_CONNECTION_TOKEN_TTL: ${WEB_SOCKET_CONNECTION_TOKEN_TTL:-60s}
  # SNS/SQS event source for realtime push: the gateway consumes the syncing
  # server's WEB_SOCKET_MESSAGE_REQUESTED events from this queue.
  SQS_QUEUE_URL: ${SQS_QUEUE_URL:-http://localstack:4566/000000000000/websocket-local-queue}
  SQS_ENDPOINT: ${SQS_ENDPOINT:-http://localstack:4566}
  SQS_AWS_REGION: ${SQS_AWS_REGION:-us-east-1}
  SQS_ACCESS_KEY_ID: ${SQS_ACCESS_KEY_ID:-localstack}
  SQS_SECRET_ACCESS_KEY: ${SQS_SECRET_ACCESS_KEY:-localstack}
  AUTH_SERVER_U2F_RELYING_PARTY_ID: ${AUTH_SERVER_U2F_RELYING_PARTY_ID:-localhost}
  AUTH_SERVER_U2F_RELYING_PARTY_NAME: ${AUTH_SERVER_U2F_RELYING_PARTY_NAME:-Standard Red Notes}
  AUTH_SERVER_U2F_EXPECTED_ORIGIN: ${AUTH_SERVER_U2F_EXPECTED_ORIGIN:-http://localhost:3001,http://localhost}
  # Assistant LLM proxy. The "openai" provider is OpenAI-compatible and driven by
  # ASSISTANT_OPENAI_BASE_URL, so it also serves LM Studio, Ollama (OpenAI mode),
  # OpenRouter and any custom OpenAI-compatible server. Local servers usually need
  # no API key. ASSISTANT_OLLAMA_URL enables the native Ollama (/api/chat) provider.
  ASSISTANT_ANTHROPIC_API_KEY: ${ASSISTANT_ANTHROPIC_API_KEY:-}
  ASSISTANT_OPENAI_API_KEY: ${ASSISTANT_OPENAI_API_KEY:-}
  ASSISTANT_OPENAI_BASE_URL: ${ASSISTANT_OPENAI_BASE_URL:-}
  ASSISTANT_OPENAI_MODEL: ${ASSISTANT_OPENAI_MODEL:-}
  ASSISTANT_OLLAMA_URL: ${ASSISTANT_OLLAMA_URL:-}
  ASSISTANT_DEFAULT_PROVIDER: ${ASSISTANT_DEFAULT_PROVIDER:-}
  ASSISTANT_DEFAULT_MODEL: ${ASSISTANT_DEFAULT_MODEL:-}
  # Global per-user daily AI request ceiling enforced by the api-gateway. 0 = unlimited.
  ASSISTANT_DAILY_REQUEST_LIMIT: ${ASSISTANT_DAILY_REQUEST_LIMIT:-0}
  # OPT-IN server-side PDF OCR (tesseract-in-Node, /v1/ocr). PRIVACY: when enabled,
  # the client may upload DECRYPTED PDF page images here for recognition — that
  # content LEAVES end-to-end encryption (the server can read it), exactly like the
  # AI proxy. The DEFAULT OCR path stays in the browser (OCR_ENABLED, above), where
  # nothing leaves the device. Two gates apply: this operator master switch AND a
  # per-user, admin-managed OCR_SERVER_ALLOWED setting (default off) — so even with
  # this on, server OCR is offered only to users an admin has explicitly allowed.
  OCR_SERVER_ENABLED: ${OCR_SERVER_ENABLED:-false}
  OCR_SERVER_DEFAULT_LANGUAGE: ${OCR_SERVER_DEFAULT_LANGUAGE:-eng}
  # Per-request bounds so an OCR call cannot pin the box (CPU-heavy; one large page
  # can take seconds). Defaults: 50 pages, 12 MB per page image.
  OCR_SERVER_MAX_PAGES: ${OCR_SERVER_MAX_PAGES:-50}
  OCR_SERVER_MAX_IMAGE_BYTES: ${OCR_SERVER_MAX_IMAGE_BYTES:-12582912}
  # Optional server-wide shared access key ("obfuscation gate"). OFF by default
  # (empty key => zero behavior change). This is OBFUSCATION / access-gating for a
  # self-hosted instance, NOT end-to-end security (that is the client-side E2E
  # encryption). When set, the api-gateway requires clients to present this key in
  # the X-Shared-Server-Key header. SHARED_SERVER_ACCESS_KEY_MODE selects what is
  # gated: "all" (every request, healthcheck exempt) or "registration" (only new
  # sign-ups). The container healthcheck path (/healthcheck) is always exempt.
  SHARED_SERVER_ACCESS_KEY: ${SHARED_SERVER_ACCESS_KEY:-}
  SHARED_SERVER_ACCESS_KEY_MODE: ${SHARED_SERVER_ACCESS_KEY_MODE:-all}

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: standard-red-notes/app:local
    restart: unless-stopped
    # Hardening: the image already runs as the unprivileged `nginx` user (uid 101)
    # and listens on 8080, so it needs no Linux capabilities. Drop them all and
    # block privilege escalation.
    #
    # NOTE: read_only is intentionally NOT set here. The OCR runtime-config
    # entrypoint (docker/docker-entrypoint.sh) rewrites the window.* globals in
    # /usr/share/nginx/html/index.html at container start, so the served bundle
    # must stay writable. nginx's own scratch paths (/var/cache/nginx, /var/run,
    # /tmp) are mounted as tmpfs to keep writes off the image layer.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # Resource ceilings: cap memory + process count so a runaway/compromised
    # container can't exhaust the host (pids_limit also blunts fork-bombs).
    # Tune via the *_MEM_LIMIT env vars.
    mem_limit: ${APP_MEM_LIMIT:-256m}
    pids_limit: 256
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    environment:
      # Client-side PDF OCR (tesseract.js). Files are end-to-end encrypted, so the
      # server NEVER sees decrypted PDFs and cannot run OCR — these flags only gate
      # whether the web client offers the "Extract text (OCR)" action and which
      # tesseract language it defaults to. The app's entrypoint templates these into
      # the static index.html at container start (no rebuild needed). OFF by default:
      # OCR downloads multi-MB language data at runtime, is slow, and accuracy varies.
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_DEFAULT_LANGUAGE: ${OCR_DEFAULT_LANGUAGE:-eng}
      # Default sync server the app loads with. Unset => the app's own origin
      # (this deployment syncs to ITSELF — never api.standardnotes.com). Set to
      # front the API on a different host, e.g. SYNC_SERVER=https://sync.example.com.
      SYNC_SERVER: ${SYNC_SERVER:-}
    depends_on:
      server:
        condition: service_healthy
    # When fronting with a reverse proxy you can drop the published port and let
    # the proxy reach this container over the shared `proxy` network (see the
    # `networks` block at the bottom). To keep direct access, leave `ports` as-is.
    ports:
      - "${APP_PORT:-3001}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - standard-red-notes
      # - proxy
    # Example Traefik labels (uncomment with the `proxy` network). The web UI,
    # the /v1 API and the realtime websocket can all be served under ONE host;
    # the routers below split by path. Adjust the host rule and TLS resolver.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=proxy"
    #   # Web UI (catch-all for the host)
    #   - "traefik.http.routers.srn-web.rule=Host(`notes.example.com`)"
    #   - "traefik.http.routers.srn-web.entrypoints=websecure"
    #   - "traefik.http.routers.srn-web.tls.certresolver=le"
    #   - "traefik.http.services.srn-web.loadbalancer.server.port=8080"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: standard-red-notes/server:local
    restart: unless-stopped
    # Hardening: the image runs supervisord + every node service as the
    # unprivileged `srn` user (uid 10001). Drop all Linux capabilities and block
    # privilege escalation. NOTE: this multi-service container WRITES at runtime
    # (per-package .env files under /opt/server/packages, supervisord/service logs,
    # file uploads), so it must keep a writable rootfs — do NOT set read_only here.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # Proper PID 1 (reap zombies, forward signals) + resource ceilings. The
    # server runs ~6 node services via supervisord, so it gets a larger memory
    # budget; raise SERVER_MEM_LIMIT if you see OOM kills under load.
    init: true
    mem_limit: ${SERVER_MEM_LIMIT:-2g}
    pids_limit: 2048
    environment:
      <<: *server-env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      localstack:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-3000}:3000"
      - "${FILES_PORT:-3125}:3104"
      # The realtime WebSocket gateway runs in-process on the api-gateway's :3000
      # listener (see SERVER_PORT above), so it no longer needs its own port.
    volumes:
      - server-logs:/var/lib/server/logs
      - uploads:/opt/shared/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/healthcheck >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - standard-red-notes
      # - proxy
    # Example Traefik labels (uncomment with the `proxy` network). Route /v1 (the
    # API gateway, port 3000) and the files endpoints (port 3104) under the same
    # host as the web UI. Files use Content-Range / Accept-Ranges, which Traefik
    # passes through transparently.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=proxy"
    #   # API gateway
    #   - "traefik.http.routers.srn-api.rule=Host(`notes.example.com`) && PathPrefix(`/v1`, `/v2`, `/healthcheck`)"
    #   - "traefik.http.routers.srn-api.entrypoints=websecure"
    #   - "traefik.http.routers.srn-api.tls.certresolver=le"
    #   - "traefik.http.routers.srn-api.service=srn-api"
    #   - "traefik.http.services.srn-api.loadbalancer.server.port=3000"

  mcp:
    profiles:
      - mcp
    build:
      context: .
      dockerfile: mcp/Dockerfile
    image: standard-red-notes/mcp:local
    restart: unless-stopped
    # Hardening: no privilege escalation, no capabilities. Internal-only — this
    # service is NEVER published to the host (reachable only by other containers
    # on the standard-red-notes network at mcp:3010). Keep it on the `mcp` profile
    # so it only runs when explicitly requested (`--profile mcp`).
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    init: true
    mem_limit: ${MCP_MEM_LIMIT:-512m}
    pids_limit: 512
    environment:
      STANDARD_RED_NOTES_SERVER_URL: http://server:3000
      STANDARD_RED_NOTES_DATA_DIR: /var/lib/standard-red-notes-mcp
      # Autonomous HTTP mode: run the MCP server as a long-lived HTTP service
      # (instead of stdio) so other containers/agents can reach it over the
      # network. MCP_HTTP_TOKEN is a REQUIRED bearer token that authenticates
      # callers — set it in your .env; with it empty the server has no auth, so
      # provide one before relying on this service.
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3010"
      MCP_HTTP_TOKEN: ${MCP_HTTP_TOKEN:-}
      # Provide account credentials to enable note tools (read-only by default).
      STANDARD_RED_NOTES_EMAIL: ${STANDARD_RED_NOTES_EMAIL:-}
      STANDARD_RED_NOTES_PASSWORD: ${STANDARD_RED_NOTES_PASSWORD:-}
      STANDARD_RED_NOTES_MFA_CODE: ${STANDARD_RED_NOTES_MFA_CODE:-}
      STANDARD_RED_NOTES_ALLOW_WRITES: ${STANDARD_RED_NOTES_ALLOW_WRITES:-0}
      STANDARD_RED_NOTES_ALLOW_REGISTER: ${STANDARD_RED_NOTES_ALLOW_REGISTER:-0}
      # Continuous background sync so the agent picks up collaborators' changes.
      STANDARD_RED_NOTES_SYNC_INTERVAL_MS: ${STANDARD_RED_NOTES_SYNC_INTERVAL_MS:-10000}
    volumes:
      - mcp-data:/var/lib/standard-red-notes-mcp
    depends_on:
      server:
        condition: service_healthy
    networks:
      - standard-red-notes

  db:
    image: mariadb:lts
    restart: unless-stopped
    # Hardening: internal-only (no host port published). Block privilege
    # escalation and drop all caps, then add back only what the official mariadb
    # entrypoint needs: it starts as root to fix data-dir ownership (CHOWN,
    # DAC_OVERRIDE, FOWNER) and then drops to the `mysql` user via setpriv
    # (SETGID, SETUID).
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    mem_limit: ${DB_MEM_LIMIT:-1g}
    pids_limit: 1024
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-standard_notes_db}
      MYSQL_USER: ${MYSQL_USER:-std_notes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme123}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - standard-red-notes

  cache:
    image: redis:8-alpine
    restart: unless-stopped
    # Hardening: internal-only (no host port published). Block privilege
    # escalation and drop all caps, adding back only SETGID/SETUID, which the
    # redis entrypoint uses to drop from root to the `redis` user.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    mem_limit: ${CACHE_MEM_LIMIT:-256m}
    pids_limit: 256
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - standard-red-notes

  localstack:
    # Pinned to 4.4.0: the last release before LocalStack (2026.3.0+) merged
    # community+pro into one image that requires a LOCALSTACK_AUTH_TOKEN even for
    # SNS/SQS. 4.4.0 runs the SNS/SQS the stack needs with no account/token.
    image: localstack/localstack:4.4.0
    restart: unless-stopped
    # Hardening: internal-only (no host port published) and no privilege
    # escalation. LocalStack runs its own root supervisor that spawns/forks the
    # emulated AWS services and manages its runtime under /var/lib/localstack, and
    # is known to misbehave under a stripped capability set, so we deliberately do
    # NOT cap_drop ALL here (it's a dev-only emulator on the internal network).
    security_opt:
      - "no-new-privileges:true"
    mem_limit: ${LOCALSTACK_MEM_LIMIT:-512m}
    pids_limit: 512
    environment:
      SERVICES: sns,sqs
      LS_LOG: warn
    volumes:
      - ./server/docker/localstack_bootstrap.sh:/etc/localstack/init/ready.d/localstack_bootstrap.sh:ro
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - standard-red-notes

networks:
  standard-red-notes:
    driver: bridge
  # ---------------------------------------------------------------------------
  # Optional: attach the proxy-facing services to an EXISTING reverse-proxy
  # network (e.g. one your Traefik/nginx container already uses) so the proxy can
  # reach them by service name without publishing host ports. Uncomment this and
  # the `proxy` entries under the `app` and `server` services, then create the
  # network once: `docker network create proxy`.
  # proxy:
  #   external: true

volumes:
  mysql-data:
  mariadb-data:
  redis-data:
  localstack-data:
  server-logs:
  uploads:
  mcp-data:
