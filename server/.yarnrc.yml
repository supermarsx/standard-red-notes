approvedGitRepositories:
  - "**"

compressionLevel: mixed

packageExtensions:
  "inversify@*":
    peerDependencies:
      reflect-metadata: "*"
    peerDependenciesMeta:
      reflect-metadata:
        optional: true
  "@inversifyjs/container@*":
    peerDependenciesMeta:
      reflect-metadata:
        optional: true
  "@inversifyjs/core@*":
    peerDependenciesMeta:
      reflect-metadata:
        optional: true
  "@inversifyjs/reflect-metadata-utils@*":
    peerDependenciesMeta:
      reflect-metadata:
        optional: true
  "inversify-express-utils@*":
    peerDependencies:
      inversify: "*"

enableGlobalCache: false

enableScripts: true

nodeLinker: pnp

npmMinimalAgeGate: 0

yarnPath: .yarn/releases/yarn-4.15.0.cjs
