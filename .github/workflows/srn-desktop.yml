# Rolling release pipeline for the Standard Red Notes DESKTOP app (Electron Forge).
#
# Unlike the CLI tools (srn-client/srn-server), Electron apps cannot be cross
# -compiled from one runner — each OS/arch is built on its own native runner.
# Stages:
#   version -> make (6-way matrix) + snap -> release
#
# Trigger: push to `main` touching the desktop package (or manual dispatch). Use
# the manual dispatch to ship a desktop build that picks up the latest web UI
# (web changes do NOT auto-trigger this heavy matrix).
#
# Versioning: rolling semver `YY.M.<run>` (e.g. 25.6.123) baked into the app and
# used as the release tag `vYY.M.<run>`. Semver is REQUIRED here (not the CLIs'
# `srn-desktop-vYY.N` form) because update.electronjs.org compares the running
# app's semver against the latest GitHub release tag to detect updates.
#
# Builds are UNSIGNED (no code-signing certificates). macOS auto-update via
# update.electronjs.org needs a signed app, so on unsigned macOS builds the app
# falls back to the in-app "a newer version exists" notification + manual
# download. Windows (Squirrel) auto-updates unsigned on x64.
name: srn-desktop

on:
  push:
    branches: [main]
    paths:
      - 'app/packages/desktop/**'
      - '.github/workflows/srn-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  # 1) VERSION — compute the rolling semver once so every matrix leg bakes the
  # SAME version into its installer and the release tags it identically.
  version:
    name: version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          set -euo pipefail
          version="$(date -u +%y).$(date -u +%-m).${GITHUB_RUN_NUMBER}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Desktop release version: ${version} (tag v${version})"

  # 2) MAKE — build installers per OS/arch on native runners via Electron Forge.
  make:
    name: make (${{ matrix.label }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: windows-x64, os: windows-latest, arch: x64 }
          - { label: windows-arm64, os: windows-11-arm, arch: arm64 }
          - { label: macos-x64, os: macos-13, arch: x64 }
          - { label: macos-arm64, os: macos-14, arch: arm64 }
          - { label: linux-x64, os: ubuntu-latest, arch: x64 }
          - { label: linux-arm64, os: ubuntu-24.04-arm, arch: arm64 }
    env:
      # Never let electron-packager try to auto-discover a signing identity.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      DESKTOP_DIR: app/packages/desktop
      INNER_DIR: app/packages/desktop/app
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: app/.nvmrc
          # yarn 3 is provided via corepack below; skip setup-node's auto cache
          # (it would mis-detect the package manager).
          package-manager-cache: false

      - name: Enable corepack (yarn 3.2.1)
        run: corepack enable

      # Native-module + maker prerequisites for Linux: libsecret (keytar),
      # rpm/fakeroot (deb+rpm makers), libfuse2 (AppImage).
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev rpm fakeroot libfuse2 || \
          sudo apt-get install -y libsecret-1-dev rpm fakeroot libfuse2t64

      # node-gyp on macOS needs a Python with setuptools (distutils removed in 3.12).
      - name: Set up Python (macOS native build)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install workspace dependencies
        working-directory: app
        run: yarn install --immutable

      - name: Bake rolling version into the app
        working-directory: ${{ env.INNER_DIR }}
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build web UI
        working-directory: app
        run: yarn workspace @standardnotes/web build

      - name: Build desktop bundle (webpack)
        working-directory: ${{ env.DESKTOP_DIR }}
        run: yarn build

      # Forge packages the inner app dir and rebuilds native modules (keytar,
      # home-server) against the Electron ABI, then runs the per-OS makers.
      - name: Forge make
        working-directory: ${{ env.INNER_DIR }}
        run: yarn forge:make --arch=${{ matrix.arch }}

      - name: Collect artifacts
        working-directory: ${{ env.INNER_DIR }}
        run: |
          set -euo pipefail
          mkdir -p staged
          # Flatten Forge's out/make/** tree, keeping only distributable files.
          find out/make -type f \
            \( -name '*.exe' -o -name '*.nupkg' -o -name 'RELEASES' \
               -o -name '*.dmg' -o -name '*.zip' \
               -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
            -exec cp -v {} staged/ \; || true
          echo "Staged:" && ls -la staged

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: srn-desktop-${{ matrix.label }}
          path: ${{ env.INNER_DIR }}/staged/*
          retention-days: 2
          if-no-files-found: error

  # 3) SNAP — Electron Forge has no snap maker, so build it separately with
  # snapcraft from the recipe at app/packages/desktop/snap/snapcraft.yaml.
  # Best-effort (does not block the release) until the recipe is validated in CI.
  snap:
    name: snap (linux-x64)
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: app/.nvmrc
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install workspace dependencies
        working-directory: app
        run: yarn install --immutable

      - name: Bake rolling version into the app
        working-directory: app/packages/desktop/app
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build web UI
        working-directory: app
        run: yarn workspace @standardnotes/web build

      - name: Build desktop bundle (webpack)
        working-directory: app/packages/desktop
        run: yarn build

      - name: Package unpacked app (Forge)
        working-directory: app/packages/desktop/app
        run: yarn forge:package --arch=x64

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft
        with:
          path: app/packages/desktop

      - name: Upload snap
        if: steps.snapcraft.outputs.snap != ''
        uses: actions/upload-artifact@v4
        with:
          name: srn-desktop-linux-snap
          path: ${{ steps.snapcraft.outputs.snap }}
          retention-days: 2
          if-no-files-found: warn

  # 4) RELEASE — gather every leg's installers and publish ONE rolling GitHub
  # Release. Must be a normal (non-draft) release so update.electronjs.org can
  # read it.
  release:
    name: release
    needs: [version, make, snap]
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: srn-desktop-*
          path: artifacts
          merge-multiple: true

      - name: Checksums
        working-directory: artifacts
        run: |
          set -euo pipefail
          ls -la
          sha256sum * > SHA256SUMS.txt || true
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Standard Red Notes Desktop ${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/*
