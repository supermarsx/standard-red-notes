# Rolling release pipeline for the Standard Red Notes DESKTOP app (electron-builder).
#
# Electron apps are built on native runners (no cross-compile). Stages:
#   version -> build (matrix) + snap -> release
#
# Trigger: push to `main` touching the desktop package, or manual dispatch (use
# dispatch to ship a desktop build that picks up the latest web UI — web changes
# do NOT auto-trigger this heavy matrix).
#
# Versioning: rolling semver `YY.M.<run>` (e.g. 25.6.123) injected via
# electron-builder's extraMetadata and used as the release tag `vYY.M.<run>`.
# Semver is required so electron-updater (GitHub provider) can compare the
# running app against the latest release.
#
# Builds are UNSIGNED: macOS notarization (scripts/notarizeMac.js) and Windows
# signing (scripts/windowsSign.js) both no-op when their credentials are absent.
# Auto-update via electron-updater still works for unsigned Windows; unsigned
# macOS falls back to the in-app "newer version available" notification.
name: srn-desktop

on:
  push:
    branches: [main]
    paths:
      - 'app/packages/desktop/**'
      - '.github/workflows/srn-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  # The `decrypt` git dependency (github:standardnotes/decrypt) ships a Yarn
  # Classic v1 lockfile, so Yarn Berry bootstraps Yarn 1.22.x to pack it during
  # `yarn install`. Two Classic-only problems break that bootstrap:
  #   * decrypt declares `engines.node: ">=14.0.0 <17.0.0"`, which Classic
  #     enforces and aborts on against the runner's Node 22 ("incompatible
  #     module"). YARN_IGNORE_ENGINES makes Classic skip the check.
  #   * decrypt's devDependencies include node-sass@7, which cannot compile on
  #     Node 22. YARN_PRODUCTION makes Classic skip devDependencies entirely;
  #     packing only needs the committed prebuilt `dist/decrypt.html`.
  # These env vars are read by the bootstrapped Yarn Classic; Yarn Berry (which
  # packs the other git deps, e.g. react-native-keychain) ignores them — our
  # vendored Yarn 3.2.1 release is patched to allowlist them instead of erroring.
  YARN_IGNORE_ENGINES: 'true'
  YARN_PRODUCTION: 'true'

defaults:
  run:
    shell: bash

jobs:
  # 1) VERSION — compute the rolling semver once so every leg bakes the same
  # version and the release tags it identically.
  version:
    name: version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          set -euo pipefail
          version="$(date -u +%y).$(date -u +%-m).${GITHUB_RUN_NUMBER}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Desktop release version: ${version} (tag v${version})"

  # 2) BUILD — electron-builder per OS. Each OS builds BOTH arches in one run so
  # the per-platform update metadata (latest*.yml) is produced once, not twice.
  # (Snap is built in its own job because it needs a distinct IS_SNAP webpack.)
  build:
    name: build (${{ matrix.label }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: macos, os: macos-14, builder: '--mac dmg zip --x64 --arm64' }
          - { label: windows, os: windows-latest, builder: '--win nsis --x64 --arm64' }
          - { label: linux-x64, os: ubuntu-latest, builder: '--linux AppImage deb --x64' }
          - { label: linux-arm64, os: ubuntu-24.04-arm, builder: '--linux AppImage deb --arm64' }
    env:
      # Never attempt to auto-discover a macOS signing identity.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: app/.nvmrc
          package-manager-cache: false

      - name: Enable corepack (yarn 3.2.1)
        run: corepack enable

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev fakeroot libfuse2 || \
          sudo apt-get install -y libsecret-1-dev fakeroot libfuse2t64

      - name: Set up Python (macOS native build)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install workspace dependencies
        working-directory: app
        run: yarn install --immutable

      - name: Build web UI
        working-directory: app
        run: yarn workspace @standardnotes/web build

      - name: Build desktop bundle (webpack)
        working-directory: app/packages/desktop
        run: yarn build

      - name: electron-builder
        working-directory: app/packages/desktop
        run: yarn electron-builder ${{ matrix.builder }} --publish never -c.extraMetadata.version=${{ needs.version.outputs.version }}

      - name: Collect installers
        working-directory: app/packages/desktop
        run: |
          set -euo pipefail
          mkdir -p staged
          # Distributables + electron-updater metadata (latest*.yml, blockmaps).
          find dist -maxdepth 1 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' \
               -o -name '*.AppImage' -o -name '*.deb' \
               -o -name '*.yml' -o -name '*.blockmap' \) \
            -exec cp -v {} staged/ \; || true
          echo "Staged:" && ls -la staged

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: srn-desktop-${{ matrix.label }}
          path: app/packages/desktop/staged/*
          retention-days: 2
          if-no-files-found: error

  # 3) SNAP — needs a separate webpack pass (IS_SNAP define) before the snap
  # target, plus snapcraft on the runner. x64 only. Best-effort: does not block
  # the release.
  snap:
    name: snap (linux-x64)
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: app/.nvmrc
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev fakeroot
          sudo snap install snapcraft --classic

      - name: Install workspace dependencies
        working-directory: app
        run: yarn install --immutable

      - name: Build web UI
        working-directory: app
        run: yarn workspace @standardnotes/web build

      - name: Build desktop bundle (snap variant)
        working-directory: app/packages/desktop
        run: yarn build --env snap

      - name: electron-builder (snap)
        working-directory: app/packages/desktop
        run: yarn electron-builder --linux snap --x64 --publish never -c.extraMetadata.version=${{ needs.version.outputs.version }}

      - name: Upload snap
        uses: actions/upload-artifact@v4
        with:
          name: srn-desktop-linux-snap
          path: app/packages/desktop/dist/*.snap
          retention-days: 2
          if-no-files-found: warn

  # 4) RELEASE — gather every leg's installers + update metadata and publish ONE
  # rolling GitHub Release (non-draft, so electron-updater can read it).
  release:
    name: release
    needs: [version, build, snap]
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: srn-desktop-*
          path: artifacts
          merge-multiple: true

      - name: Checksums
        working-directory: artifacts
        run: |
          set -euo pipefail
          ls -la
          sha256sum * > SHA256SUMS.txt || true
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Standard Red Notes Desktop ${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/*
