# Pull-request / main CI: check + build for the whole monorepo and the two CLIs.
#
# The repo is several SEPARATE yarn workspace roots:
#   - root    (yarn 4, nodeLinker: node-modules)  -> workspaces: mcp, openclaw
#   - app/    (yarn 3, nodeLinker: node-modules)  -> its own workspaces
#   - server/ (yarn 4, nodeLinker: pnp)           -> Yarn PnP
# The root `check`/`build` scripts `cd app && ...` and `cd server && ...`, so a
# `yarn install` must run in EACH root before they work. Yarn versions are
# pinned via each dir's `packageManager` field / `.yarnrc.yml`; corepack picks
# the right one per directory.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # Whole-monorepo check + build. This mirrors the root `check` and `build`
  # scripts, which fan out across the mcp/openclaw/app/server workspaces.
  monorepo:
    name: monorepo check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # corepack ships the pinned yarn (4.15.0 root/server, 3.2.1 app) declared
      # by each directory's packageManager field — no manual yarn install.
      - name: Enable corepack
        run: corepack enable

      # Cache all three yarn caches. PnP keeps its cache under server/.yarn/cache.
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/berry/cache
            .yarn/cache
            app/.yarn/cache
            server/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock', 'app/yarn.lock', 'server/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      # Three separate installs, one per workspace root. --immutable fails the
      # build if a lockfile is out of date (the CI-correct behaviour).
      - name: Install (root)
        run: yarn install --immutable

      - name: Install (app)
        working-directory: app
        run: yarn install --immutable

      - name: Install (server, PnP)
        working-directory: server
        run: yarn install --immutable

      - name: Check (typecheck + lint + format:check + test)
        run: yarn check

      - name: Build
        run: yarn build

  # Fast standalone check + build for the two CLI tools (independent npm
  # packages, not part of any yarn workspace root). Released by the dedicated
  # release-srn-* workflows; verified on every PR here.
  cli:
    name: cli ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [srn-client, srn-server]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: cli/${{ matrix.tool }}/package.json

      - name: Install
        working-directory: cli/${{ matrix.tool }}
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Typecheck
        working-directory: cli/${{ matrix.tool }}
        run: npm run typecheck

      - name: Build
        working-directory: cli/${{ matrix.tool }}
        run: npm run build

      # srn-server's `build` is tsc; also exercise its bundle path so the
      # packaging entry (dist/index.cjs) is verified on PRs too.
      - name: Build bundle (srn-server)
        if: matrix.tool == 'srn-server'
        working-directory: cli/${{ matrix.tool }}
        run: npm run build:bundle
